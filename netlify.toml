[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 requires Node 20.19+ / 22.12+
  NODE_VERSION = "22"
  VITE_SUPABASE_URL = "https://iymhjrmmgwrxdggcvmjn.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5bWhqcm1tZ3dyeGRnZ2N2bWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODczMjMsImV4cCI6MjA5NzQ2MzMyM30.chkToSYCr6jRk6dCIwF1mqygIt1jiRTnoEUa_d-sJ-Y"

# AI chat backend (netlify/functions/ai-chat.mts). ANTHROPIC_API_KEY and
# SUPABASE_SERVICE_ROLE_KEY are server-only secrets — set them in the Netlify
# UI (Site settings → Environment variables), never here or in .env.local.
[functions]
  directory = "netlify/functions"

# `netlify dev` proxies the Vite dev server so functions work locally too.
[dev]
  command = "npm run dev -- --port 5180 --strictPort"
  targetPort = 5180
  port = 8888

# SPA fallback: let React Router handle client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
